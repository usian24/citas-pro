# ══════════════════════════════════════
#   CITAS PRO — Configuración Netlify
# ══════════════════════════════════════

[build]
  publish = "."
  functions = "netlify/functions"

# Archivos JS — MIME type correcto (fix del error de scripts)
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

# Archivos CSS
[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

# Headers de seguridad para todo
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "no-cache"

# SPA routing — orden importa, más específico primero
[[redirects]]
  from = "/b/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/netlify/*"
  to = "/netlify/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"