<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
  <meta name="theme-color" content="#07090F"/>
  <title>Tienda | Citas Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  
  <style>
    /* Estilos exclusivos para la tienda */
    body { background: var(--bg); padding-bottom: 90px; }
    
    /* Header de la tienda */
    .shop-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7, 9, 15, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--b);
    }
    [data-theme="light"] .shop-header { background: rgba(244, 247, 251, 0.95); }
    
    /* Buscador Tienda */
    .shop-search {
      margin: 20px;
      background: var(--card);
      border: 1.5px solid var(--b);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .shop-search input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font); font-size: 15px;
    }
    
    /* Carrusel de Categorías (Swipe) */
    .cat-scroll {
      display: flex; gap: 16px; padding: 0 20px 20px;
      overflow-x: auto; scroll-snap-type: x mandatory;
      scrollbar-width: none; /* Firefox */
    }
    .cat-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari */
    
    .cat-item {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      scroll-snap-align: start; cursor: pointer; flex-shrink: 0;
    }
    .cat-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--bblue); border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; overflow: hidden; transition: all 0.2s;
    }
    .cat-item.active .cat-circle { border-color: var(--blue); background: var(--blue); color: #fff; }
    .cat-name { font-size: 12px; font-weight: 700; color: var(--t2); transition: color 0.2s; }
    .cat-item.active .cat-name { color: var(--blue); }
    
    /* Grilla de Productos */
    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; padding: 0 20px; max-width: 1200px; margin: 0 auto;
    }
    
    /* Tarjeta de Producto */
    .p-card {
      background: var(--card); border: 1px solid var(--b);
      border-radius: 20px; overflow: hidden; position: relative;
      display: flex; flex-direction: column; transition: transform 0.2s;
    }
    .p-card:active { transform: scale(0.97); }
    
    .p-img-wrap {
      width: 100%; aspect-ratio: 1; background: #fff; /* Fondo blanco para productos */
      position: relative; padding: 10px; display: flex; align-items: center; justify-content: center;
    }
    .p-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; border-radius: 8px; }
    
    .p-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--red); color: #fff; font-size: 10px; font-weight: 800;
      padding: 4px 8px; border-radius: 8px;
    }
    .p-like {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.1); width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; backdrop-filter: blur(4px);
    }
    
    .p-info { padding: 14px; flex: 1; display: flex; flex-direction: column; }
    .p-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .p-stars { font-size: 10px; color: var(--gold); margin-bottom: 8px; }
    
    .p-price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; margin-top: auto; }
    .p-old { font-size: 11px; color: var(--muted); text-decoration: line-through; }
    .p-new { font-size: 16px; font-weight: 900; color: var(--green); }
    
    /* Botón flotante del carrito */
    .cart-float {
      position: fixed; bottom: 24px; right: 24px; z-index: 90;
      width: 60px; height: 60px; border-radius: 20px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 25px rgba(74,127,212,0.4); cursor: pointer;
      color: white;
    }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--red); color: white; font-size: 11px; font-weight: 900;
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--bg);
    }
  </style>
</head>
<body>

  <header class="shop-header">
    <button onclick="window.history.back()" style="background:rgba(255,255,255,0.07); border:1px solid var(--b); border-radius:12px; padding:8px 14px; font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:6px;">
      ← Atrás
    </button>
    <div style="font-size:16px; font-weight:800; text-align:center" id="shop-title">Cargando Tienda...</div>
    <button onclick="document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'" style="width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;color:var(--text);">
      ☀️
    </button>
  </header>

  <div class="shop-search">
    <span>🔍</span>
    <input type="text" placeholder="Buscar geles, ceras, lociones..."/>
  </div>

  <div style="font-size:16px; font-weight:900; padding: 0 20px; margin-bottom:14px;">Categorías destacadas</div>
  <div class="cat-scroll">
    <div class="cat-item active">
      <div class="cat-circle">🌟</div>
      <span class="cat-name">Todo</span>
    </div>
    <div class="cat-item">
      <div class="cat-circle" style="background:#FFE4E1">👁️</div>
      <span class="cat-name">Rostro</span>
    </div>
    <div class="cat-item">
      <div class="cat-circle" style="background:#E0FFFF">🧴</div>
      <span class="cat-name">Lociones</span>
    </div>
    <div class="cat-item">
      <div class="cat-circle" style="background:#F0FFF0">💈</div>
      <span class="cat-name">Ceras</span>
    </div>
    <div class="cat-item">
      <div class="cat-circle" style="background:#F5F5DC">✂️</div>
      <span class="cat-name">Equipos</span>
    </div>
  </div>

  <div class="product-grid">
    
    <div class="p-card">
      <div class="p-img-wrap">
        <span class="p-badge">-35%</span>
        <div class="p-like">🤍</div>
        <img src="https://placehold.co/300x300/ffffff/4A7FD4?text=Producto+1" alt="Producto" style="height:120px;"/>
      </div>
      <div class="p-info">
        <div class="p-title">Kit Limpiador Facial Piel Grasa 473ml + Protector Solar</div>
        <div class="p-stars">★★★★★ <span style="color:var(--muted)">(24)</span></div>
        <div class="p-price-row">
          <span class="p-old">259.00€</span>
          <span class="p-new">168.35€</span>
        </div>
        <button class="btn btn-dark btn-sm">Añadir al carrito</button>
      </div>
    </div>

    <div class="p-card">
      <div class="p-img-wrap">
        <div class="p-like" style="color:var(--red)">❤️</div>
        <img src="https://placehold.co/300x300/ffffff/4A7FD4?text=Producto+2" alt="Producto" style="height:120px;"/>
      </div>
      <div class="p-info">
        <div class="p-title">Cera Fijadora Efecto Mate Barber Pro 100g</div>
        <div class="p-stars">★★★★☆ <span style="color:var(--muted)">(12)</span></div>
        <div class="p-price-row">
          <span class="p-new">15.00€</span>
        </div>
        <button class="btn btn-dark btn-sm">Añadir al carrito</button>
      </div>
    </div>

  </div>

  <div class="cart-float">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
    <div class="cart-badge">2</div>
  </div>

  <script src="assets/js/db.js"></script>
   <script src="assets/js/tienda-cliente.js"></script>

  <script>
    let SHOP_BIZ = null; // Aquí guardaremos los datos de la barbería actual

    document.addEventListener("DOMContentLoaded", function() {
      // 1. Cargamos la base de datos con seguridad
      if (typeof loadDB === 'function') {
         window.DB = loadDB();
      }

      // 2. Extraer el ID de forma más inteligente
      let bizId = '';
      const hash = window.location.hash;
      
      if (hash && hash.includes('#b/')) {
        // Si el cliente entró por su link público
        bizId = hash.split('#b/')[1].split('/')[0];
      } else if (window.DB && window.DB.currentBiz) {
        // Fallback: Si el DUEÑO entra a probar y el link falló, usamos su sesión activa
        bizId = window.DB.currentBiz;
      }
      
      // 3. Validamos si logramos conseguir un ID
      if (bizId && window.DB && window.DB.businesses) {
        
        // Buscamos la barbería en nuestra base de datos
        SHOP_BIZ = window.DB.businesses.find(b => b.id === bizId);
        
        if (SHOP_BIZ) {
          console.log("Tienda cargada exitosamente:", SHOP_BIZ.name);
          
          // ¡Cambiamos el título de la tienda!
          document.getElementById('shop-title').textContent = "Tienda de " + SHOP_BIZ.name;
          
        } else {
          document.getElementById('shop-title').textContent = "Barbería no encontrada";
          console.error("Error: No se encontró la barbería en la base de datos.");
        }
      } else {
         document.getElementById('shop-title').textContent = "Enlace inválido";
         console.error("No se detectó un ID válido de barbería.");
      }
    });
  </script>
</body>
</html>
