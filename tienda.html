<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
  <meta name="theme-color" content="#07090F"/>
  <title>Tienda | Citas Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <link rel="stylesheet" href="assets/css/tienda.css">
</head>
<body>

<!-- Header -->
<header class="shop-header">
  <button onclick="window.history.back()"
          style="background:rgba(255,255,255,0.07);border:1px solid var(--b);border-radius:12px;
                 padding:8px 14px;font-size:13px;font-weight:600;color:var(--text);
                 display:flex;align-items:center;gap:6px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg> Atrás
  </button>
  <div style="font-size:15px;font-weight:800;text-align:center" id="shop-title">Cargando...</div>
  <button onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'"
          style="width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.07);
                 border:1px solid var(--b);display:flex;align-items:center;justify-content:center;color:var(--text);">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
    </svg>
  </button>
</header>

<!-- Buscador -->
<div class="shop-search">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="text" id="shop-search-input" placeholder="Buscar productos..."
         oninput="buscarProductos(this.value)"/>
</div>

<!-- Categorías -->
<div style="font-size:15px;font-weight:900;padding:0 20px;margin-bottom:14px;">Categorías</div>
<div class="cat-scroll" id="client-cats"></div>

<!-- Catálogo -->
<div id="catalogo-root"></div>

<!-- Carrito flotante -->
<div class="cart-float" onclick="abrirCarrito()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
  </svg>
  <div class="cart-badge" id="cart-count">0</div>
</div>

<div id="toast-msg"></div>

<!-- ══════════════════════════════════════
     CARRITO DRAWER
══════════════════════════════════════ -->
<div class="cart-overlay" id="cart-overlay" onclick="cerrarCarrito()"></div>

<div class="cart-drawer" id="cart-drawer">
  <div class="cart-handle"></div>

  <div class="cart-drawer-hdr">
    <h2>
      🛒 Mi Carrito
      <span class="cart-total-badge" id="cart-items-count">0 items</span>
    </h2>
    <div class="cart-close-btn" onclick="cerrarCarrito()">×</div>
  </div>

  <!-- Lista de productos -->
  <div class="cart-items" id="cart-items-list"></div>

  <!-- Footer con resumen y botones -->
  <div class="cart-footer" id="cart-footer">
    <div class="cart-summary" id="cart-summary"></div>
    <button class="cart-btn-wa" id="cart-btn-wa" onclick="pedirPorWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.529 5.845L.057 23.885a.5.5 0 0 0 .609.609l6.04-1.472A11.942 11.942 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.659-.516-5.177-1.415l-.371-.22-3.844.937.952-3.844-.243-.394A9.961 9.961 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
      </svg>
      Pedir por WhatsApp
    </button>
    <button class="cart-btn-clear" onclick="vaciarCarrito()">
       Vaciar carrito
    </button>
  </div>
</div>

<!-- Modal alerta -->
<div class="ov" id="ov-shop-alert">
  <div class="modal" onclick="event.stopPropagation()"
       style="max-width:320px;text-align:center;padding:30px 20px;">
    <div style="font-size:48px;margin-bottom:16px;" id="sa-icon">🛍️</div>
    <div style="font-size:20px;font-weight:900;margin-bottom:8px;color:var(--text);" id="sa-title">Atención</div>
    <div style="font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.6" id="sa-msg"></div>
    <button class="btn btn-blue"
            onclick="document.getElementById('ov-shop-alert').classList.remove('on')"
            style="width:100%;font-size:15px;padding:14px;">Entendido</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/js/db.js"></script>
<script src="assets/js/cliente-tienda.js"></script>
</body>
</html>
