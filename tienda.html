<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
  <meta name="theme-color" content="#07090F"/>
  <title>Tienda | Citas Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>

  <style>
    body { background: var(--bg); padding-bottom: 100px; }

    /* ── Header ── */
    .shop-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,15,0.96); backdrop-filter: blur(12px);
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--b);
    }
    [data-theme="light"] .shop-header { background: rgba(244,247,251,0.96); }

    /* ── Buscador ── */
    .shop-search {
      margin: 16px 20px;
      background: var(--card); border: 1.5px solid var(--b);
      border-radius: 16px; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .shop-search input {
      flex:1; background:none; border:none; outline:none;
      color:var(--text); font-family:var(--font); font-size:14px;
    }

    /* ── Pills categoría ── */
    .cat-scroll {
      display:flex; gap:14px; padding:0 20px 20px;
      overflow-x:auto; scroll-snap-type:x mandatory; scrollbar-width:none;
    }
    .cat-scroll::-webkit-scrollbar { display:none; }
    .cat-pill-client {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      flex-shrink:0; cursor:pointer; transition:transform 0.2s; scroll-snap-align:start;
    }
    .cat-pill-client:active { transform:scale(0.9); }
    .cat-circle {
      width:60px; height:60px; border-radius:50%;
      background:var(--card); border:2px solid var(--b);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; transition:all 0.25s; position:relative;
    }
    .cat-pill-client.active .cat-circle {
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      border-color:var(--blue); box-shadow:0 6px 18px rgba(74,127,212,0.45);
    }
    .cat-pill-client.active .cat-circle::after {
      content:''; position:absolute; inset:-5px;
      border-radius:50%; border:2px solid rgba(74,127,212,0.35);
    }
    .cat-label {
      font-size:10px; font-weight:700; color:var(--t2);
      max-width:66px; text-align:center; line-height:1.2;
    }
    .cat-pill-client.active .cat-label { color:#7EB8FF; }

    /* ── Tren de productos ── */
    .catalogo-seccion { margin-bottom:32px; }
    .catalogo-seccion-titulo {
      font-size:15px; font-weight:900; padding:0 20px; margin-bottom:14px;
      display:flex; align-items:center; gap:8px;
    }
    .catalogo-seccion-titulo span.cnt {
      font-size:11px; font-weight:700; color:var(--blue);
      background:rgba(74,127,212,0.12); padding:2px 8px; border-radius:10px;
    }
    .tren-scroll {
      display:flex; gap:12px; padding:4px 20px 12px;
      overflow-x:auto; scroll-snap-type:x mandatory;
      scrollbar-width:none; -webkit-overflow-scrolling:touch;
    }
    .tren-scroll::-webkit-scrollbar { display:none; }
    .tren-col {
      display:flex; flex-direction:column; gap:12px;
      flex-shrink:0; scroll-snap-align:start;
      width:calc((100vw - 52px) / 3);
      min-width:110px; max-width:150px;
    }

    /* ── Tarjeta ── */
    .p-card {
      background:var(--card); border:1px solid var(--b);
      border-radius:16px; overflow:hidden; position:relative;
      display:flex; flex-direction:column; transition:transform 0.18s;
      box-shadow:0 3px 10px rgba(0,0,0,0.07);
      animation:fadeUp 0.3s ease both;
    }
    .p-card:active { transform:scale(0.96); }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .p-img-wrap {
      width:100%; aspect-ratio:1/1; background:#fff;
      position:relative; padding:10px;
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .p-img-wrap img {
      max-width:100%; max-height:100%;
      object-fit:contain; mix-blend-mode:multiply; border-radius:6px;
    }
    .p-discount-badge {
      position:absolute; top:7px; left:7px;
      background:#EF4444; color:#fff;
      font-size:9px; font-weight:900;
      padding:3px 6px; border-radius:6px; z-index:2;
    }
    .p-like {
      position:absolute; top:7px; right:7px;
      background:rgba(255,255,255,0.88); width:28px; height:28px;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      color:#aaa; cursor:pointer; border:1px solid rgba(0,0,0,0.06);
      transition:color 0.2s, transform 0.15s; z-index:2;
    }
    .p-like.active { color:#EF4444; }
    .p-like:active { transform:scale(1.25); }
    .p-info { padding:8px 10px 10px; flex:1; display:flex; flex-direction:column; }
    .p-tag {
      align-self:flex-start; font-size:8px; color:var(--blue); font-weight:800;
      background:rgba(74,127,212,0.12); padding:2px 6px; border-radius:5px;
      text-transform:uppercase; margin-bottom:4px; letter-spacing:0.3px;
    }
    .p-title {
      font-size:11px; font-weight:700; color:var(--text);
      line-height:1.3; margin-bottom:4px;
      display:-webkit-box; -webkit-line-clamp:2;
      -webkit-box-orient:vertical; overflow:hidden;
    }
    .p-price-wrap { margin-bottom:6px; margin-top:auto; }
    .p-price-old { font-size:10px; color:var(--muted); text-decoration:line-through; font-weight:600; line-height:1; }
    .p-price-new { font-size:14px; font-weight:900; color:var(--green); line-height:1.2; }
    .p-price-new.discounted { color:#EF4444; }
    .p-stars { display:flex; gap:1px; margin-bottom:6px; align-items:center; }
    .star { font-size:9px; color:#d1d5db; transition:color 0.2s; }
    .star.on { color:#FBBF24; }
    .p-stars-count { font-size:9px; color:var(--muted); font-weight:600; margin-left:3px; }
    .p-stock { font-size:9px; font-weight:700; margin-bottom:5px; }
    .p-stock.ok  { color:var(--green); }
    .p-stock.low { color:#F59E0B; }
    .p-stock.out { color:var(--red); }
    .p-add-btn {
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      color:#fff; border:none; border-radius:8px;
      padding:7px 4px; font-size:10px; font-weight:700;
      cursor:pointer; width:100%; font-family:var(--font); transition:opacity 0.2s;
    }
    .p-add-btn:active { opacity:0.8; }
    .p-add-btn:disabled { background:var(--b); color:var(--muted); cursor:not-allowed; }

    /* ══════════════════════════════════════
       CARRITO — Drawer desde abajo
    ══════════════════════════════════════ */

    /* Overlay oscuro */
    .cart-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.55);
      z-index:200; opacity:0; pointer-events:none;
      transition:opacity 0.3s;
    }
    .cart-overlay.on { opacity:1; pointer-events:all; }

    /* Drawer */
    .cart-drawer {
      position:fixed; bottom:0; left:0; right:0; z-index:201;
      background:var(--card);
      border-radius:24px 24px 0 0;
      max-height:88vh;
      display:flex; flex-direction:column;
      transform:translateY(100%);
      transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
      box-shadow:0 -8px 40px rgba(0,0,0,0.3);
    }
    .cart-drawer.on { transform:translateY(0); }

    /* Handle */
    .cart-handle {
      width:40px; height:4px; border-radius:2px;
      background:var(--b); margin:12px auto 0;
      flex-shrink:0;
    }

    /* Header del drawer */
    .cart-drawer-hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px 12px; flex-shrink:0;
      border-bottom:1px solid var(--b);
    }
    .cart-drawer-hdr h2 {
      font-size:18px; font-weight:900; margin:0;
      display:flex; align-items:center; gap:8px;
    }
    .cart-total-badge {
      font-size:11px; font-weight:800; color:var(--blue);
      background:rgba(74,127,212,0.12);
      padding:3px 8px; border-radius:10px;
    }
    .cart-close-btn {
      width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,0.07); border:1px solid var(--b);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--text); font-size:18px; line-height:1;
    }

    /* Lista de items — scrolleable */
    .cart-items {
      flex:1; overflow-y:auto; padding:12px 20px;
      scrollbar-width:none;
    }
    .cart-items::-webkit-scrollbar { display:none; }

    /* Item individual */
    .cart-item {
      display:flex; align-items:center; gap:12px;
      padding:12px 0; border-bottom:1px solid var(--b);
      animation:fadeUp 0.25s ease both;
    }
    .cart-item:last-child { border-bottom:none; }

    .cart-item-img {
      width:56px; height:56px; border-radius:12px;
      background:#fff; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; border:1px solid var(--b);
    }
    .cart-item-img img {
      max-width:100%; max-height:100%;
      object-fit:contain; mix-blend-mode:multiply;
    }

    .cart-item-info { flex:1; min-width:0; }
    .cart-item-name {
      font-size:13px; font-weight:700; color:var(--text);
      line-height:1.3; margin-bottom:3px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .cart-item-cat {
      font-size:10px; color:var(--blue); font-weight:700;
      background:rgba(74,127,212,0.1); padding:1px 6px;
      border-radius:5px; display:inline-block; margin-bottom:4px;
    }
    .cart-item-price {
      font-size:14px; font-weight:900; color:var(--green);
    }
    .cart-item-price .old {
      font-size:10px; color:var(--muted); text-decoration:line-through;
      font-weight:600; margin-right:4px;
    }
    .cart-item-price.disc { color:#EF4444; }

    /* Controles cantidad */
    .cart-qty {
      display:flex; align-items:center; gap:6px; flex-shrink:0;
    }
    .cart-qty-btn {
      width:28px; height:28px; border-radius:8px;
      border:1.5px solid var(--b); background:var(--bg);
      color:var(--text); font-size:16px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.15s; line-height:1;
    }
    .cart-qty-btn:active { transform:scale(0.9); }
    .cart-qty-btn.minus { color:var(--red); border-color:rgba(239,68,68,0.3); }
    .cart-qty-num {
      font-size:15px; font-weight:900; color:var(--text);
      min-width:20px; text-align:center;
    }

    /* Carrito vacío */
    .cart-empty {
      text-align:center; padding:40px 20px; color:var(--muted);
    }
    .cart-empty div:first-child { font-size:48px; margin-bottom:12px; }
    .cart-empty p { font-size:14px; line-height:1.6; }

    /* Footer del drawer — resumen + botones */
    .cart-footer {
      padding:16px 20px 24px; flex-shrink:0;
      border-top:1px solid var(--b);
      background:var(--card);
    }

    /* Resumen de precios */
    .cart-summary { margin-bottom:14px; }
    .cart-summary-row {
      display:flex; justify-content:space-between; align-items:center;
      font-size:13px; color:var(--t2); margin-bottom:6px;
    }
    .cart-summary-row.total {
      font-size:18px; font-weight:900; color:var(--text);
      border-top:1px solid var(--b); padding-top:10px; margin-top:4px;
    }
    .cart-summary-row.total span:last-child { color:var(--green); }
    .cart-summary-row .discount-line { color:#EF4444; font-weight:700; }

    /* Botón WhatsApp */
    .cart-btn-wa {
      width:100%; padding:16px;
      background:linear-gradient(135deg,#25D366,#128C7E);
      color:#fff; border:none; border-radius:16px;
      font-size:15px; font-weight:800; font-family:var(--font);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      gap:10px; transition:opacity 0.2s; margin-bottom:10px;
    }
    .cart-btn-wa:active { opacity:0.85; }

    /* Botón vaciar */
    .cart-btn-clear {
      width:100%; padding:11px;
      background:rgba(239,68,68,0.07); color:var(--red);
      border:1.5px solid rgba(239,68,68,0.2); border-radius:12px;
      font-size:13px; font-weight:700; font-family:var(--font);
      cursor:pointer; transition:all 0.2s;
    }
    .cart-btn-clear:active { background:rgba(239,68,68,0.15); }

    /* ── Carrito flotante ── */
    .cart-float {
      position:fixed; bottom:24px; right:20px; z-index:90;
      width:56px; height:56px; border-radius:16px;
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 8px 24px rgba(74,127,212,0.5); cursor:pointer;
      color:white; transition:transform 0.2s;
    }
    .cart-float:active { transform:scale(0.93); }
    .cart-badge {
      position:absolute; top:-6px; right:-6px;
      background:#EF4444; color:white;
      font-size:10px; font-weight:900;
      width:20px; height:20px; border-radius:50%;
      display:none; align-items:center; justify-content:center;
      border:2px solid var(--bg);
    }

    /* ── Toast ── */
    #toast-msg {
      position:fixed; bottom:90px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--blue); color:#fff;
      padding:10px 22px; border-radius:40px;
      font-size:13px; font-weight:700; opacity:0;
      pointer-events:none;
      transition:all 0.35s cubic-bezier(0.68,-0.55,0.26,1.55);
      z-index:300; white-space:nowrap;
    }
    #toast-msg.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .empty-state {
      text-align:center; padding:40px 20px;
      color:var(--muted); font-size:13px;
    }
    .empty-state div:first-child { font-size:36px; margin-bottom:10px; }
  </style>
</head>
<body>

<!-- Header -->
<header class="shop-header">
  <button onclick="window.history.back()"
          style="background:rgba(255,255,255,0.07);border:1px solid var(--b);border-radius:12px;
                 padding:8px 14px;font-size:13px;font-weight:600;color:var(--text);
                 display:flex;align-items:center;gap:6px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"

          style="width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.07);
                 border:1px solid var(--b);display:flex;align-items:center;justify-content:center;color:var(--text);">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    </svg>
  </button>
</header>

<!-- Buscador -->
<div class="shop-search">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="text" id="shop-search-input" placeholder="Buscar productos..."
         oninput="buscarProductos(this.value)"/>
</div>

<!-- Categorías -->
<div style="font-size:15px;font-weight:900;padding:0 20px;margin-bottom:14px;">Categorías</div>
<div class="cat-scroll" id="client-cats"></div>

<!-- Catálogo -->
<div id="catalogo-root"></div>

<!-- Carrito flotante -->
<div class="cart-float" onclick="abrirCarrito()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
  </svg>
  <div class="cart-badge" id="cart-count">0</div>
</div>

<div id="toast-msg"></div>

<!-- ══════════════════════════════════════
     CARRITO DRAWER
══════════════════════════════════════ -->
<div class="cart-overlay" id="cart-overlay" onclick="cerrarCarrito()"></div>

<div class="cart-drawer" id="cart-drawer">
  <div class="cart-handle"></div>

  <div class="cart-drawer-hdr">
    <h2>
      🛒 Mi Carrito
      <span class="cart-total-badge" id="cart-items-count">0 items</span>
    </h2>
    <div class="cart-close-btn" onclick="cerrarCarrito()">×</div>

  <!-- Lista de productos -->
  <div class="cart-items" id="cart-items-list"></div>

  <!-- Footer con resumen y botones -->
  <div class="cart-footer" id="cart-footer">
    <div class="cart-summary" id="cart-summary"></div>
    <button class="cart-btn-wa" id="cart-btn-wa" onclick="pedirPorWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

      Pedir por WhatsApp
    </button>
    <button class="cart-btn-clear" onclick="vaciarCarrito()">
      🗑️ Vaciar carrito
    </button>
  </div>
</div>

<!-- Modal alerta -->
<div class="ov" id="ov-shop-alert">
  <div class="modal" onclick="event.stopPropagation()"
       style="max-width:320px;text-align:center;padding:30px 20px;">
    <div style="font-size:48px;margin-bottom:16px;" id="sa-icon">🛍️</div>
    <div style="font-size:20px;font-weight:900;margin-bottom:8px;color:var(--text);" id="sa-title">Atención</div>
    <div style="font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.6" id="sa-msg"></div>
    <button class="btn btn-blue"
            onclick="document.getElementById('ov-shop-alert').classList.remove('on')"
            style="width:100%;font-size:15px;padding:14px;">Entendido</button>
  </div>
</div>

<script>

const SUPABASE_URL      = 'https://krbtoepzoorpdedtykug.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_IXquO0XEbEkFBmZgblzjVg_adtTWCW-';
const tiendaSupa        = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ════════════════════════════════════════════
// ESTADO GLOBAL
// ════════════════════════════════════════════
let productosDB     = [];
let carrito         = []; // [{ product, cantidad }]
let currentCategory = 'all';
let maxRating       = 1;
let toastTimeout;
let bizIdGlobal     = '';
let bizWAPhone      = ''; // teléfono del negocio para WhatsApp

function getLikes() {
  try { return JSON.parse(localStorage.getItem('cp_likes') || '{}'); } catch { return {}; }
}
function setLike(prodId, val) {
  const l = getLikes(); l[prodId] = val;
  localStorage.setItem('cp_likes', JSON.stringify(l));
}

// ════════════════════════════════════════════
// EMOJI POR CATEGORÍA
// ════════════════════════════════════════════
function emojiParaCategoria(cat) {
  const map = {
    'ceras':'🪙','cera':'🪙','carteras':'👜','cartera':'👜',
    'ropa':'👕','complementos':'🎩','accesorios':'⌚',
    'perfumes':'🌸','perfume':'🌸','cremas':'🧴','crema':'🧴',
    'champu':'🚿','champú':'🚿','aceites':'💧','aceite':'💧',
    'navajas':'🪒','maquinillas':'🪒','tonicos':'✨','tonico':'✨',
    'geles':'💎','gel':'💎','barberia':'💈','barbería':'💈',
    'peluqueria':'✂️','peluquería':'✂️','todo':'⭐',
    'botas':'👢','bota':'👢','toros':'🐂','toro':'🐂',
    'pestanas':'👁️','pestañas':'👁️',
  };
  const lower = (cat||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return map[lower] || '🛍️';
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  if (typeof loadDB === 'function') window.DB = loadDB();

  const hash = window.location.hash;
  if (hash && hash.includes('#b/')) {
    bizIdGlobal = hash.split('#b/')[1].split('/')[0];
  } else if (window.DB?.currentBiz) {
    bizIdGlobal = window.DB.currentBiz;
  }

  if (bizIdGlobal) {
    const biz = window.DB?.businesses?.find(b => b.id === bizIdGlobal);
    document.getElementById('shop-title').textContent = biz ? biz.name : 'Nuestra Tienda';
    if (biz?.phone) bizWAPhone = biz.phone.replace(/\D/g,'');
    await fetchProductos(bizIdGlobal);
  } else {
    document.getElementById('shop-title').textContent = 'Enlace inválido';
  }
});

async function fetchProductos(bizId) {
  try {
    const { data, error } = await tiendaSupa
      .from('products').select('*').eq('business_id', bizId);
    if (error) throw error;
    productosDB = data || [];
    maxRating   = Math.max(1, ...productosDB.map(p => p.rating || 0));
    inicializarTienda();
  } catch(err) {
    console.error('Error tienda:', err);
    document.getElementById('catalogo-root').innerHTML =
      '<div class="empty-state"><div>❌</div>Error al cargar productos.</div>';
  }
}

// ════════════════════════════════════════════
// CATEGORÍAS + CATÁLOGO
// ════════════════════════════════════════════
function inicializarTienda() {
  renderCategorias();
  renderCatalogo('all');
}

function renderCategorias() {
  const container = document.getElementById('client-cats');
  if (!container) return;
  const cats = [...new Set(productosDB.map(p=>(p.category||'').trim()).filter(Boolean))].sort();
  let html = `
    <div class="cat-pill-client ${currentCategory==='all'?'active':''}" onclick="filtrarProductos('all')">
      <div class="cat-circle">${emojiParaCategoria('todo')}</div>
      <div class="cat-label">Todo</div>
    </div>`;
  cats.forEach(cat => {
    html += `
      <div class="cat-pill-client ${currentCategory===cat?'active':''}"
           onclick="filtrarProductos('${cat.replace(/'/g,"\\'")}')">
        <div class="cat-circle">${emojiParaCategoria(cat)}</div>
        <div class="cat-label">${cat}</div>
      </div>`;
  });
  container.innerHTML = html;
}

function filtrarProductos(catId) {
  currentCategory = catId;
  document.getElementById('shop-search-input').value = '';
  renderCategorias();
  renderCatalogo(catId);
}

function buscarProductos(termino) {
  const text = termino.toLowerCase().trim();
  if (!text) { currentCategory='all'; renderCategorias(); renderCatalogo('all'); return; }
  currentCategory = '';
  renderCategorias();
  const filtrados = productosDB.filter(p => (p.name||'').toLowerCase().includes(text));
  const root = document.getElementById('catalogo-root');
  root.innerHTML = filtrados.length
    ? renderSeccion('🔍 Resultados', filtrados, 'search')
    : '<div class="empty-state"><div>🔍</div>Sin resultados.</div>';
}

function renderCatalogo(catId) {
  const root = document.getElementById('catalogo-root');
  if (!root) return;
  if (catId === 'all') {
    const todos = [...productosDB];
    let html = renderSeccion('🛍️ Catálogo', todos, 'all');
    const cats = [...new Set(todos.map(p=>(p.category||'').trim()).filter(Boolean))].sort();
    cats.forEach(cat => {
      const prods = todos.filter(p=>(p.category||'').trim()===cat);
      html += renderSeccion(`${emojiParaCategoria(cat)} ${cat}`, prods, cat);
    });
    root.innerHTML = html || '<div class="empty-state"><div>📦</div>Sin productos aún.</div>';
  } else {
    const prods = productosDB.filter(p=>(p.category||'').trim()===catId);
    root.innerHTML = prods.length
      ? renderSeccion(`${emojiParaCategoria(catId)} ${catId}`, prods, catId)
      : '<div class="empty-state"><div>😔</div>No hay productos en esta categoría.</div>';
  }
}

function renderSeccion(titulo, prods, catKey) {
  if (!prods.length) return '';
  const likes = getLikes();
  const ROWS  = 3;
  const cols  = [];
  for (let i = 0; i < prods.length; i += ROWS) cols.push(prods.slice(i, i+ROWS));
  const colsHtml = cols.map(col =>
    `<div class="tren-col">${col.map((p,idx) => renderCard(p, likes, idx)).join('')}</div>`
  ).join('');
  return `
    <div class="catalogo-seccion">
      <div class="catalogo-seccion-titulo">
        ${titulo} <span class="cnt">${prods.length}</span>
      </div>
      <div class="tren-scroll">${colsHtml}</div>
    </div>`;
}

// ════════════════════════════════════════════
// TARJETA
// ════════════════════════════════════════════
function renderCard(p, likes, animIdx) {
  const liked      = !!likes[p.id];
  const estrellas  = calcularEstrellas(p.rating||0);
  const precio     = parseFloat(p.price)||0;
  const descuento  = parseFloat(p.discount_percent)||0;
  const precioFinal = descuento>0 ? precio*(1-descuento/100) : precio;
  const stock      = p.stock!=null ? parseInt(p.stock) : null;
  const img        = p.image || 'https://placehold.co/300x300/ffffff/4A7FD4?text=Producto';
  const catName    = (p.category||'General').trim();

  let stockHtml = '';
  if (stock!==null) {
    if (stock<=0)    stockHtml = '<div class="p-stock out">Sin stock</div>';
    else if (stock<=5) stockHtml = `<div class="p-stock low">Últimas ${stock} uds</div>`;
    else             stockHtml = '<div class="p-stock ok">En stock</div>';
  }

  const precioHtml = descuento>0
    ? `<div class="p-price-wrap">
         <div class="p-price-old">${precio.toFixed(2)}€</div>
         <div class="p-price-new discounted">${precioFinal.toFixed(2)}€</div>
       </div>`
    : `<div class="p-price-wrap">
         <div class="p-price-new">${precio.toFixed(2)}€</div>
       </div>`;

  const starsHtml = `
    <div class="p-stars">
      ${[1,2,3,4,5].map(i=>`<span class="star${i<=estrellas?' on':''}">★</span>`).join('')}
      <span class="p-stars-count">${p.rating||0}</span>
    </div>`;

  const badgeHtml  = descuento>0 ? `<div class="p-discount-badge">-${Math.round(descuento)}%</div>` : '';
  const btnDisabled = stock!==null && stock<=0;

  return `
    <div class="p-card" style="animation-delay:${animIdx*0.06}s">
      <div class="p-img-wrap">
        ${badgeHtml}
        <div class="p-like ${liked?'active':''}" onclick="toggleLike(this,'${p.id}')" title="Me gusta">
          <svg width="13" height="13" viewBox="0 0 24 24"
               fill="${liked?'currentColor':'none'}" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <img src="${img}" alt="${p.name}" loading="lazy"/>
      </div>
      <div class="p-info">
        <div class="p-tag">${catName}</div>
        <div class="p-title">${p.name}</div>
        ${starsHtml}
        ${stockHtml}
        ${precioHtml}
        <button class="p-add-btn" ${btnDisabled?'disabled':''} onclick="agregarAlCarrito('${p.id}')">
          ${btnDisabled ? 'Sin stock' : '+ Añadir'}
        </button>
      </div>
    </div>`;
}

function calcularEstrellas(rating) {
  if (!rating || maxRating===0) return 0;
  return Math.round((rating/maxRating)*5);
}

// ════════════════════════════════════════════
// CORAZÓN + RATING
// ════════════════════════════════════════════
async function toggleLike(btn, prodId) {
  const likes  = getLikes();
  const yaLike = !!likes[prodId];
  const svg    = btn.querySelector('svg');
  const prod   = productosDB.find(p=>p.id===prodId);
  if (!prod) return;

  if (yaLike) {
    btn.classList.remove('active'); svg.setAttribute('fill','none');
    setLike(prodId, false);
    const newRating = Math.max(0,(prod.rating||0)-1);
    prod.rating = newRating;
    await tiendaSupa.from('products').update({rating:newRating}).eq('id',prodId);
  } else {
    btn.classList.add('active'); svg.setAttribute('fill','currentColor');
    setLike(prodId, true);
    const newRating = (prod.rating||0)+1;
    prod.rating = newRating;
    maxRating   = Math.max(maxRating, newRating);
    btn.style.transform = 'scale(1.4)';
    setTimeout(()=>btn.style.transform='scale(1)',200);
    mostrarToast('❤️ ¡Añadido a favoritos!');
    await tiendaSupa.from('products').update({rating:newRating}).eq('id',prodId);
  }

  // Refrescar estrellas en todas las cards
  document.querySelectorAll('.p-card').forEach(card => {
    const likeBtn = card.querySelector('.p-like');
    if (!likeBtn) return;
    const pid = likeBtn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if (!pid) return;
    const p = productosDB.find(x=>x.id===pid);
    if (!p) return;
    const est = calcularEstrellas(p.rating||0);
    card.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<est));
    const countEl = card.querySelector('.p-stars-count');
    if (countEl) countEl.textContent = p.rating||0;
  });
}

// ════════════════════════════════════════════
// CARRITO — lógica completa
// ════════════════════════════════════════════
function precioFinalProducto(p) {
  const precio   = parseFloat(p.price)||0;
  const desc     = parseFloat(p.discount_percent)||0;
  return desc>0 ? precio*(1-desc/100) : precio;
}

function agregarAlCarrito(id) {
  const prod = productosDB.find(p=>p.id===id);
  if (!prod) return;
  if (prod.stock!=null && prod.stock<=0) { mostrarToast('❌ Producto sin stock'); return; }

  const item = carrito.find(c=>c.product.id===id);
  if (item) { item.cantidad++; }
  else      { carrito.push({ product:prod, cantidad:1 }); }

  actualizarBadgeCarrito();

  const btn = document.querySelector('.cart-float');
  btn.style.transform = 'scale(1.18)';
  setTimeout(()=>btn.style.transform='scale(1)',200);

  mostrarToast(`🛒 Añadido: ${prod.name}`);
}

function cambiarCantidad(id, delta) {
  const item = carrito.find(c=>c.product.id===id);
  if (!item) return;
  item.cantidad += delta;
  if (item.cantidad <= 0) carrito = carrito.filter(c=>c.product.id!==id);
  actualizarBadgeCarrito();
  renderCartItems();
}

function eliminarDelCarrito(id) {
  carrito = carrito.filter(c=>c.product.id!==id);
  actualizarBadgeCarrito();
  renderCartItems();
}

function vaciarCarrito() {
  carrito = [];
  actualizarBadgeCarrito();
  renderCartItems();
}

function actualizarBadgeCarrito() {
  const badge = document.getElementById('cart-count');
  if (!badge) return;
  const total = carrito.reduce((s,i)=>s+i.cantidad,0);
  badge.textContent = total;
  badge.style.display = total>0 ? 'flex' : 'none';
}

// ── Abrir / Cerrar drawer ──
function abrirCarrito() {
  document.getElementById('cart-overlay').classList.add('on');
  document.getElementById('cart-drawer').classList.add('on');
  document.body.style.overflow = 'hidden';
  renderCartItems();
}

function cerrarCarrito() {
  document.getElementById('cart-overlay').classList.remove('on');
  document.getElementById('cart-drawer').classList.remove('on');
  document.body.style.overflow = '';
}

// ── Render del contenido del carrito ──
function renderCartItems() {
  const listEl    = document.getElementById('cart-items-list');
  const summaryEl = document.getElementById('cart-summary');
  const countEl   = document.getElementById('cart-items-count');
  const footerEl  = document.getElementById('cart-footer');

  const totalItems = carrito.reduce((s,i)=>s+i.cantidad,0);
  countEl.textContent = `${totalItems} item${totalItems!==1?'s':''}`;

  if (!carrito.length) {
    listEl.innerHTML = `
      <div class="cart-empty">
        <div>🛒</div>
        <p>Tu carrito está vacío.<br>Añade productos para empezar.</p>
      </div>`;
    summaryEl.innerHTML = '';
    footerEl.querySelector('.cart-btn-wa').style.display  = 'none';
    footerEl.querySelector('.cart-btn-clear').style.display = 'none';
    return;
  }

  footerEl.querySelector('.cart-btn-wa').style.display    = 'flex';
  footerEl.querySelector('.cart-btn-clear').style.display = 'block';

  // Items
  listEl.innerHTML = carrito.map(item => {
    const p          = item.product;
    const precio     = parseFloat(p.price)||0;
    const desc       = parseFloat(p.discount_percent)||0;
    const precioUnit = precioFinalProducto(p);
    const subtotal   = precioUnit * item.cantidad;
    const img        = p.image || 'https://placehold.co/300x300/ffffff/4A7FD4?text=Producto';
    const catName    = (p.category||'General').trim();

    const precioHtml = desc>0
      ? `<span class="old">${precio.toFixed(2)}€</span>${precioUnit.toFixed(2)}€`
      : `${precioUnit.toFixed(2)}€`;

    return `
      <div class="cart-item">
        <div class="cart-item-img">
          <img src="${img}" alt="${p.name}" loading="lazy"/>
        </div>
        <div class="cart-item-info">
          <div class="cart-item-cat">${catName}</div>
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-price ${desc>0?'disc':''}">${precioHtml}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">
            Subtotal: <strong style="color:var(--text)">${subtotal.toFixed(2)}€</strong>
          </div>
        </div>
        <div class="cart-qty">
          <div class="cart-qty-btn minus" onclick="cambiarCantidad('${p.id}',-1)">
            ${item.cantidad===1 ? '🗑️' : '−'}
          </div>
          <div class="cart-qty-num">${item.cantidad}</div>
          <div class="cart-qty-btn" onclick="cambiarCantidad('${p.id}',1)">+</div>
        </div>
      </div>`;
  }).join('');

  // Resumen de precios
  let subtotalSinDesc = 0;
  let totalDescuento  = 0;
  let totalFinal      = 0;

  carrito.forEach(item => {
    const precio     = parseFloat(item.product.price)||0;
    const desc       = parseFloat(item.product.discount_percent)||0;
    const precioUnit = precioFinalProducto(item.product);
    subtotalSinDesc += precio * item.cantidad;
    totalDescuento  += (precio - precioUnit) * item.cantidad;
    totalFinal      += precioUnit * item.cantidad;
  });

  const hayDescuento = totalDescuento > 0;

  summaryEl.innerHTML = `
    <div class="cart-summary-row">
      <span>Subtotal (${totalItems} items)</span>
      <span>${subtotalSinDesc.toFixed(2)}€</span>
    </div>
    ${hayDescuento ? `
    <div class="cart-summary-row">
      <span class="discount-line">🏷️ Descuentos aplicados</span>
      <span class="discount-line">-${totalDescuento.toFixed(2)}€</span>
    </div>` : ''}
    <div class="cart-summary-row total">
      <span>Total</span>
      <span>${totalFinal.toFixed(2)}€</span>
    </div>`;
}

// ── Pedir por WhatsApp ──
function pedirPorWhatsApp() {
  if (!carrito.length) return;

  const nombreTienda = document.getElementById('shop-title').textContent;
  let totalFinal = 0;

  const lineas = carrito.map(item => {
    const precioUnit = precioFinalProducto(item.product);
    const subtotal   = precioUnit * item.cantidad;
    totalFinal      += subtotal;
    const desc       = parseFloat(item.product.discount_percent)||0;
    const descTxt    = desc>0 ? ` (-${Math.round(desc)}%)` : '';
    return `• ${item.product.name}${descTxt} x${item.cantidad} = ${subtotal.toFixed(2)}€`;
  }).join('\n');

  const mensaje = `Hola, me gustaría hacer el siguiente pedido en *${nombreTienda}*:\n\n${lineas}\n\n*Total: ${totalFinal.toFixed(2)}€*\n\n¿Está disponible?`;

  const phone = bizWAPhone || '34611200984'; // fallback al soporte
  const url   = `https://wa.me/${phone}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ════════════════════════════════════════════
// HELPERS UI
// ════════════════════════════════════════════
function mostrarAlertaCustom(titulo, mensaje, icono='🛍️') {
  document.getElementById('sa-icon').innerText  = icono;
  document.getElementById('sa-title').innerText = titulo;
  document.getElementById('sa-msg').innerText   = mensaje;
  document.getElementById('ov-shop-alert').classList.add('on');
}

function mostrarToast(msg) {
  const t = document.getElementById('toast-msg');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=>t.classList.remove('show'), 2200);
}

// Cerrar drawer con swipe hacia abajo
(function initSwipeCarrito() {
  let startY = 0;
  const drawer = document.getElementById('cart-drawer');
  drawer.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive:true});
  drawer.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientY - startY;
    if (diff > 80) cerrarCarrito(); // swipe abajo > 80px = cerrar
  }, {passive:true});
})();
</script>
