<script>
  function actualizarPreviewDescuento() {
    const precio  = parseFloat(document.getElementById('prod-price').value) || 0;
    const desc    = parseFloat(document.getElementById('prod-discount').value) || 0;
    const preview = document.getElementById('prod-discount-preview');
    if (desc > 0 && precio > 0) {
      const final = (precio * (1 - desc / 100)).toFixed(2);
      preview.textContent = `El cliente verá: ${money(precio)} → ${money(final)} (-${Math.round(desc)}%)`;
    } else {
      preview.textContent = '';
    }
  }

  function abrirTiendaSegura() {
    if (window.location.hash && window.location.hash.includes('#b/')) {
      window.location.href = 'tienda.html' + window.location.hash;
      return;
    }
    let nombreBarberia = document.getElementById('bp-name').innerText;
    let baseDatos = window.DB || (typeof loadDB === 'function' ? loadDB() : null);
    if (baseDatos && baseDatos.businesses) {
      let negocio = baseDatos.businesses.find(b => b.name === nombreBarberia);
      if (negocio) {
        window.location.href = 'tienda.html#b/' + negocio.id;
        return;
      }
    }
    if (typeof CUR !== 'undefined' && CUR && CUR.id) {
      window.location.href = 'tienda.html#b/' + CUR.id;
      return;
    }
    alert("Error: No pudimos identificar la barbería para abrir la tienda.");
  }
</script>
